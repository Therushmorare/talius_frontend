<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Talius | Multi Factor Authentication</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/static/css/login.css">
<link rel="stylesheet" href="/static/css/alerts.css">
</head>

<body class="flex items-center justify-center min-h-screen text-white">

<div class="w-full max-w-md">

<div class="text-center mb-8">

<div class="alert-container" id="alertContainer"></div>

<h1 class="text-2xl font-bold">Multi-Factor Authentication</h1>
<p class="text-gray-400 text-sm">
Enter the code from your authenticator app
</p>
</div>

<div class="card rounded-xl p-8 text-center">

<form id="mfaForm">

<div class="flex justify-center gap-3 mb-6">
<input class="code-input" maxlength="1">
<input class="code-input" maxlength="1">
<input class="code-input" maxlength="1">
<input class="code-input" maxlength="1">
<input class="code-input" maxlength="1">
<input class="code-input" maxlength="1">
</div>

<button type="submit"
class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded font-semibold">
Verify Authentication
</button>

<p id="mfaError" class="text-red-400 text-sm mt-4 hidden"></p>

<button type="button" id="resendBtn"
class="mt-4 text-blue-400 hover:text-blue-300 text-sm">
Resend Code
</button>

</form>

</div>

</div>

<script src="/static/js/alerts.js"></script>

<script>

// Autofocus logic
const inputs = document.querySelectorAll(".code-input");

inputs.forEach((input,index)=>{
  input.addEventListener("input",()=>{
    if(input.value.length === 1 && index < inputs.length - 1){
      inputs[index+1].focus();
    }
  });
});

// Get stored user
const user = JSON.parse(sessionStorage.getItem("user"));

if(!user){
  window.location.href = "/login"; // safety
}

// Submit MFA
document.getElementById("mfaForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const errorEl = document.getElementById("mfaError");
  errorEl.classList.add("hidden");

  // Combine 6-digit code
  let code = "";
  inputs.forEach(input => code += input.value);

  if(code.length !== 6){
    createAlert("Enter complete 6-digit code", "error");
    return;
  }

  try {
    const response = await fetch("https://talius-api-9jsjo.ondigitalocean.app/api/talius/verify-mfa", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        user_id: user.user_id,
        code: code
      })
    });

    const data = await response.json();

    if(!response.ok){
      createAlert(data.message, "info");
      return;
    }

    // Save new token
    sessionStorage.setItem("access_token", data.access_token);

    // Redirect based on user_type
    if(user.user_type.toLowerCase() === "admin"){
      window.location.href = "/admin/dashboard";
    } else if (user.user_type.toLowerCase() === "asset_manager") {
      window.location.href = "manager/dashboard";
    } else if (user.user_type.toLowerCase() === "asset_controller"){
        window.location.href = "controller/dashboard";
    } else if (user.user_type.toLowerCase() === "custodian"){
        window.location.href = "custodian/dashboard";
    }

  } catch(err){
    createAlert("Server Error", "error");
    console.error(err);
  }

});

// Resend MFA
document.getElementById("resendBtn").addEventListener("click", async () => {

  try {
    const response = await fetch("https://talius-api-9jsjo.ondigitalocean.app/api/talius/resend-mfa", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: user.email,
        user_type: user.user_type
      })
    });

    const data = await response.json();

    createAlert(data.message || "Code resent!", "info");

  } catch(err){
    createAlert("Failed to resend code", "error");
  }

});

</script>

</body>
</html>
