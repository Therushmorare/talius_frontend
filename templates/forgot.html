<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Talius | Reset Password</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/css/login.css">
<link rel="stylesheet" href="/static/css/alerts.css">
</head>

<body class="flex items-center justify-center min-h-screen text-white">

<div class="w-full max-w-md">

<div class="text-center mb-8">

<div class="alert-container" id="alertContainer"></div>

<i class="fa-solid fa-cubes text-blue-500 text-4xl mb-3"></i>
<h1 class="text-2xl font-bold">Talius</h1>
<p class="text-gray-400 text-sm">Reset your password</p>

</div>

<div class="card rounded-xl p-8">

<form id="forgotForm" class="space-y-5">

<div>

<label class="text-sm text-gray-300">Email Address</label>

<input
type="email"
required
name="email"
id="emailInput"
class="input w-full mt-2 p-3 rounded"
placeholder="email@company.com">

<p id="emailError" class="text-red-400 text-sm hidden">Enter a valid email</p>

</div>

<button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded font-semibold">
Send Verification Code
</button>

<p id="formMessage" class="text-green-400 text-sm mt-2 hidden"></p>
<p id="formError" class="text-red-400 text-sm mt-2 hidden"></p>

</form>

</div>

<div class="text-center mt-6 text-sm text-gray-500">
© 2026 Talius
</div>

</div>

<script src="/static/js/alerts.js"></script>

<script>
const form = document.getElementById("forgotForm");
const emailInput = document.getElementById("emailInput");
const emailError = document.getElementById("emailError");
const formMessage = document.getElementById("formMessage");
const formError = document.getElementById("formError");

form.addEventListener("submit", async function(e){
  e.preventDefault();

  emailError.classList.add("hidden");
  formMessage.classList.add("hidden");
  formError.classList.add("hidden");

  const email = emailInput.value.trim();
  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if(!emailPattern.test(email)){
    emailError.classList.remove("hidden");
    return;
  }

  try {
    const response = await fetch("/api/talius/forgot-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email: email })
    });

    const data = await response.json();

    if(!response.ok){
      createAlert(data.message|| "Failed to send verification code", "info");
      formError.textContent = data.message || "Failed to send verification code";
      formError.classList.remove("hidden");
      return;
    }

    // Save email temporarily in sessionStorage for verification page
    sessionStorage.setItem("reset_email", email);

    createAlert("Verification code sent! Redirecting....", "success");

    // Redirect to MFA/verification page
    setTimeout(()=>{
      window.location.href = "/verifyPage";
    }, 1500);

  } catch(err){
    createAlert("Server Error", "error");
    console.error(err);
  }
});
</script>

</body>
</html>
