{% macro modal(id, title="", message="", type="info", show_close=true, auto_close=0, actions=[]) %}
<div class="modal-backdrop" id="{{ id }}-backdrop" style="display:none;">
    <div class="modal-component modal-{{ type }}" id="{{ id }}">
        <div class="modal-header">
            <h3 class="modal-title">{{ title }}</h3>
            {% if show_close %}
            <button class="modal-close" onclick="closeModal('{{ id }}')">&times;</button>
            {% endif %}
        </div>

        <div class="modal-body">
            {{ message }}
        </div>

        {% if actions %}
        <div class="modal-actions">
            {% for action in actions %}
            <button class="modal-btn {{ action.class|default('') }}" onclick="{{ action.onclick|default('') }}">
                {{ action.label }}
            </button>
            {% endfor %}
        </div>
        {% endif %}
    </div>
</div>
{% endmacro %}
