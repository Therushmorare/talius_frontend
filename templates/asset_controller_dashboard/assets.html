<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talius | Assets</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans min-h-screen flex">

<!-- Sidebar -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-gray-900 text-gray-200 flex flex-col shadow-lg transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-40">
  <div class="px-6 py-6 text-2xl font-bold text-indigo-400 tracking-wider">Talius</div>
  <nav class="flex-1 px-2 space-y-2">
    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-600 transition"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a>
    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-600 transition"><i class="fas fa-box"></i> <span>Assets</span></a>
    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-600 transition"><i class="fas fa-exclamation-triangle"></i> <span>Exceptions</span></a>
    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-600 transition"><i class="fas fa-cog"></i> <span>Settings</span></a>
  </nav>
  <div class="px-6 py-4 border-t border-gray-700">
    <button class="w-full flex items-center gap-2 px-4 py-2 bg-gray-800 rounded-lg hover:bg-gray-700 transition">
      <i class="fas fa-sign-out-alt"></i><span>Logout</span>
    </button>
  </div>
</aside>

<!-- Mobile overlay -->
<div id="sidebarOverlay" class="fixed inset-0 bg-black/40 z-30 hidden md:hidden" onclick="toggleSidebar()"></div>

<!-- Main content -->
<div class="flex-1 flex flex-col md:ml-64">

  <!-- Header -->
  <header class="flex justify-between items-center bg-white shadow-md px-4 py-3 sticky top-0 z-30 md:hidden">
    <button id="menuBtn" class="text-gray-700 text-2xl" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <h1 class="text-xl font-bold text-gray-800 truncate">Assets</h1>
    <div class="flex items-center gap-2">
      <button class="relative text-gray-600 hover:text-gray-900">
        <i class="fas fa-bell text-xl"></i>
        <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
      </button>
      <div class="bg-indigo-500 text-white rounded-full w-8 h-8 flex items-center justify-center font-bold text-sm">AC</div>
    </div>
  </header>

  <!-- Content -->
  <main class="p-6 flex-1 flex flex-col gap-6">

    <!-- Tabs -->
    <div class="flex flex-wrap gap-3">
      <button data-tab="verified" class="tab-btn py-2 px-5 rounded-full bg-indigo-600 text-white font-semibold">Verified</button>
      <button data-tab="upcoming" class="tab-btn py-2 px-5 rounded-full bg-gray-200 text-gray-800 hover:bg-indigo-100">Upcoming</button>
      <button data-tab="exceptions" class="tab-btn py-2 px-5 rounded-full bg-gray-200 text-gray-800 hover:bg-red-100">Exceptions</button>
    </div>

    <!-- Filters -->
    <div class="flex flex-col sm:flex-row gap-3 mt-4">
      <input type="text" placeholder="Search by name or ID" class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
      <select class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <option value="">All Statuses</option>
        <option value="Verified">Verified</option>
        <option value="Pending">Pending</option>
        <option value="In Review">In Review</option>
        <option value="Exception">Exception</option>
      </select>
    </div>

    <!-- Asset Cards (example) -->
    <div id="verified" class="tab-content grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mt-4">
      <div class="bg-white rounded-3xl shadow-md overflow-hidden flex flex-col">
        <div class="p-4 flex items-center justify-between bg-indigo-50">
          <div class="flex items-center gap-3">
            <i class="fas fa-laptop text-indigo-500 text-2xl"></i>
            <div>
              <h2 class="font-bold text-gray-800">Dell Latitude 5540</h2>
              <p class="text-gray-500 text-sm">AST-10421</p>
            </div>
          </div>
          <span class="px-3 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-600">Verified</span>
        </div>
        <div class="p-4 flex-1 flex flex-col gap-2">
          <p><strong>Custodian:</strong> Sarah Chen</p>
          <p><strong>Location:</strong> Head Office / Tower A / 4F-012</p>
          <p><strong>Date:</strong> 2026-03-12</p>
        </div>
        <div class="p-4 flex gap-2 border-t border-gray-100">
          <button class="flex-1 py-2 rounded-xl bg-green-500 text-white font-semibold hover:bg-green-600 flex items-center justify-center gap-2">
            <i class="fas fa-check"></i> Resolve
          </button>
          <button class="flex-1 py-2 rounded-xl bg-indigo-500 text-white font-semibold hover:bg-indigo-600 flex items-center justify-center gap-2">
            <i class="fas fa-eye"></i> View
          </button>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sidebarOverlay');
function toggleSidebar() {
  sidebar.classList.toggle('-translate-x-full');
  overlay.classList.toggle('hidden');
}

// Tabs
const tabs = document.querySelectorAll('.tab-btn');
const contents = document.querySelectorAll('.tab-content');
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('bg-indigo-600','text-white','font-semibold'));
    tabs.forEach(t => t.classList.add('bg-gray-200','text-gray-800'));

    tab.classList.remove('bg-gray-200','text-gray-800');
    tab.classList.add('bg-indigo-600','text-white','font-semibold');

    contents.forEach(c => c.classList.add('hidden'));
    document.getElementById(tab.dataset.tab).classList.remove('hidden');
  });
});
</script>
</body>
</html>
