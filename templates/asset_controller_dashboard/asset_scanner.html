<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talius | Asset Scan</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<script src="/js/html5-qrcode.min.js"></script>
<style>
  /* Scanner overlay corners */
  .corner {
    position: absolute;
    width: 40px;
    height: 40px;
    border: 4px solid #6366f1; /* indigo-500 */
  }
  .corner.top-left { top: 0; left: 0; border-right: none; border-bottom: none; }
  .corner.top-right { top: 0; right: 0; border-left: none; border-bottom: none; }
  .corner.bottom-left { bottom: 0; left: 0; border-right: none; border-top: none; }
  .corner.bottom-right { bottom: 0; right: 0; border-left: none; border-top: none; }
</style>
</head>
<body class="bg-gray-50 font-sans flex flex-col min-h-screen">

<!-- Sidebar -->
<!-- Sidebar -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-gray-900 text-gray-200 flex flex-col shadow-lg transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-40">
  <div class="px-6 py-8 text-2xl font-bold text-indigo-400 tracking-wider">Talius</div>
  <nav class="flex-1 px-2 space-y-2">
    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-600 transition"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-600 transition"><i class="fas fa-box"></i><span>Assets</span></a>
    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-600 transition"><i class="fas fa-exclamation-triangle"></i><span>Exceptions</span></a>
    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-600 transition"><i class="fas fa-cog"></i><span>Settings</span></a>
  </nav>
  <div class="px-6 py-4 border-t border-gray-700">
    <button class="w-full flex items-center gap-2 px-4 py-2 bg-gray-800 rounded-lg hover:bg-gray-700 transition">
      <i class="fas fa-sign-out-alt"></i>Logout
    </button>
  </div>
</aside>

<!-- Mobile overlay -->
<div id="sidebarOverlay" class="fixed inset-0 bg-black/40 z-30 hidden md:hidden" onclick="toggleSidebar()"></div>

<!-- Mobile Navbar -->
<header class="flex justify-between items-center bg-white shadow-md px-4 py-3 md:hidden sticky top-0 z-30">
  <button id="menuBtn" class="text-gray-700 text-2xl" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
  <h1 class="text-xl font-bold text-gray-800">Asset Scan</h1>
  <div class="flex items-center gap-2">
    <button class="relative text-gray-600 hover:text-gray-900">
      <i class="fas fa-bell text-xl"></i>
      <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
    </button>
    <div class="bg-indigo-500 text-white rounded-full w-8 h-8 flex items-center justify-center font-bold text-sm">AC</div>
  </div>
</header>

<!-- Main Content -->
<main class="flex-1 flex flex-col items-center justify-center p-4 md:ml-64">

  <!-- Page Title -->
  <div class="text-center mb-6">
    <h2 class="text-3xl font-bold text-gray-800">Scan Asset</h2>
    <p class="text-gray-600 mt-2 max-w-md mx-auto">Point your camera at the asset's barcode or QR code. Align the code within the frame below.</p>
  </div>

  <!-- Scanner Area -->
  <div class="relative w-full max-w-md h-96 bg-gray-900 rounded-2xl overflow-hidden shadow-lg">
    <div id="reader" class="w-full h-full"></div>

    <!-- Animated corners -->
    <div class="corner top-left"></div>
    <div class="corner top-right"></div>
    <div class="corner bottom-left"></div>
    <div class="corner bottom-right"></div>
  </div>

  <!-- Scan Result Card -->
  <div id="result" class="mt-6 w-full max-w-md bg-white rounded-2xl shadow-xl p-6 text-center transition-all transform scale-95 opacity-80">
    <p class="text-gray-600 text-lg">Waiting for scan...</p>
  </div>

</main>

<script>
// Sidebar toggle
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sidebarOverlay');
function toggleSidebar() {
  sidebar.classList.toggle('-translate-x-full');
  overlay.classList.toggle('hidden');
}

// QR Scanner
const resultDiv = document.getElementById("result");
const html5QrcodeScanner = new Html5Qrcode("reader");

function onScanSuccess(decodedText, decodedResult) {
  resultDiv.innerHTML = `
    <p class="text-green-600 font-semibold text-lg">Asset Scanned:</p>
    <p class="text-gray-800 font-bold text-xl mt-2">${decodedText}</p>
    <button onclick="location.href='/verify/${decodedText}'" 
      class="mt-4 bg-indigo-500 text-white px-6 py-2 rounded-xl hover:bg-indigo-600 transition font-medium flex items-center justify-center gap-2 mx-auto">
      <i class="fas fa-check"></i> Verify Asset
    </button>
  `;
  resultDiv.classList.add("scale-100", "opacity-100");
  html5QrcodeScanner.stop().catch(err => console.error(err));
}

function onScanError(errorMessage) {
  // optional: handle scan errors
}

Html5Qrcode.getCameras().then(cameras => {
  if (cameras && cameras.length) {
    html5QrcodeScanner.start(
      { deviceId: cameras[0].id },
      { fps: 10, qrbox: 280 },
      onScanSuccess,
      onScanError
    ).catch(err => console.error("Camera start error:", err));
  } else {
    resultDiv.innerHTML = `<p class="text-red-500 font-semibold">No camera found</p>`;
  }
}).catch(err => {
  resultDiv.innerHTML = `<p class="text-red-500 font-semibold">Camera access error</p>`;
  console.error(err);
});
</script>

</body>
</html>
