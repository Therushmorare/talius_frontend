<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Talius | {% block title %}{% endblock %}</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

{% block head %}{% endblock %}

</head>


<body class="flex h-screen bg-gray-100 font-sans">

<!-- Sidebar -->
<aside class="fixed top-0 left-0 h-full w-64 bg-gray-900 text-gray-200 flex flex-col shadow-lg">

  <!-- Brand -->
  <div class="px-6 py-8 text-2xl font-bold text-indigo-400 tracking-wider">
    Talius
  </div>

  <div class="border-b border-gray-700 mb-4"></div>

  <!-- Navigation -->
  <nav class="flex-1 px-2 space-y-2">

    <a href="/admin/dashboard"
       class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-600
       {% if active_page == 'dashboard' %}bg-indigo-600{% endif %}">
       <i class="fas fa-tachometer-alt"></i>
       <span>Dashboard</span>
    </a>

    <a href="/admin/assets"
       class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-600
       {% if active_page == 'assets' %}bg-indigo-600{% endif %}">
       <i class="fas fa-box"></i>
       <span>Assets</span>
    </a>

    <a href="/admin/exceptions"
       class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-600
       {% if active_page == 'exceptions' %}bg-indigo-600{% endif %}">
       <i class="fas fa-exclamation-triangle"></i>
       <span>Exceptions</span>
    </a>

    <a href="/admin/users"
       class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-600
       {% if active_page == 'users' %}bg-indigo-600{% endif %}">
       <i class="fas fa-users"></i>
       <span>Users</span>
    </a>

    <a href="/admin/depreciation"
       class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-600
       {% if active_page == 'depreciation' %}bg-indigo-600{% endif %}">
       <i class="fas fa-dollar-sign"></i>
       <span>Depreciation</span>
    </a>

    <a href="/admin/disposals"
       class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-600
       {% if active_page == 'disposals' %}bg-indigo-600{% endif %}">
       <i class="fas fa-trash"></i>
       <span>Disposals</span>
    </a>

    <a href="/admin/reports"
       class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-600
       {% if active_page == 'reports' %}bg-indigo-600{% endif %}">
       <i class="fas fa-chart-line"></i>
       <span>Reports</span>
    </a>

    <a href="/admin/settings"
       class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-600
       {% if active_page == 'settings' %}bg-indigo-600{% endif %}">
       <i class="fas fa-cog"></i>
       <span>Settings</span>
    </a>

  </nav>

  <!-- Sidebar Footer -->
  <div class="px-6 py-4 border-t border-gray-700">
    <a href="/logout"
       class="w-full flex items-center gap-2 px-4 py-2 bg-gray-800 rounded-lg hover:bg-gray-700 transition">
      <i class="fas fa-sign-out-alt"></i>
      <span>Logout</span>
    </a>
  </div>

</aside>

<!-- Page Content -->
<main>

{% block content %}
{% endblock %}

</main>

{% block scripts %}{% endblock %}

</body>
</html>
